<!DOCTYPE html>
<html lang="id">
  <head>
    <!-- SECTION: Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IdeaOratio | Topic</title>
    <meta
      name="description"
      content="Buat ide topik pidato segar dalam hitungan detik. Cocok untuk tugas presentasi, latihan pidato, atau lomba pidato."
    />

    <!-- SECTION: Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- SECTION: Styles -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="gradient-mesh">
    <div class="page-shell grain">
      <!-- Decorative shapes -->
      <div class="floating-shape floating-shape--left" aria-hidden="true"></div>
      <div class="floating-shape floating-shape--right" aria-hidden="true"></div>

      <!-- SECTION: Main Content -->
      <main class="layout" aria-label="Generator topik pidato">
        <header class="hero" role="banner">
          <h1 class="hero__title">Dapatkan ide topik pidato hanya dengan satu klik.</h1>
          <p class="hero__subtitle">
            Bingung mau membahas apa? Dapatkan sebuah topic yang siap dipakai.
          </p>
        </header>

        <!-- SECTION: Generator Box -->
        <section class="generator" aria-label="Kotak generator topik pidato">
          <div class="generator__header">
            <h2 class="generator__title">Generator Topik</h2>
          </div>

           <form class="generator__controls" novalidate>
             <button type="button" class="btn btn--primary" id="generate-btn">
               Dapatkan topik
             </button>
           </form>
 
           <div class="generator__output gradient-border shadow-soft" aria-live="polite">
             <p class="output-label">Topik kamu</p>
             <div class="output-viewport">
               <div class="output-track" id="output-track">
                  <p class="output-text" id="topic-text">
                    Klik "Dapatkan topik" untuk mulai.
                  </p>
               </div>
             </div>
          </div>
        </section>
      </main>
    </div>

    <!-- SECTION: Scripts -->
    <script src="topic.js"></script>
    <script src="script.js"></script>
  </body>
</html>
